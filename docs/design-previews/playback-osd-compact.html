<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Playback OSD Compact Preview</title>
  <style>
    :root {
      --canvas: #05070a;
      --surface: #10161c;
      --surface-raised: #202832;
      --overlay: rgba(16, 22, 28, 0.78);
      --overlay-strong: rgba(5, 7, 10, 0.88);
      --hairline: rgba(238, 243, 246, 0.13);
      --text: #eef3f6;
      --muted: #a9b3ba;
      --subtle: #73818c;
      --focus-fill: rgba(104, 114, 122, 0.56);
      --progress: #5d8f68;
      --play-accent: #78b985;
      --safe-x: 56px;
      --safe-top: 40px;
      --safe-bottom: 64px;
      color-scheme: dark;
      font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--canvas);
      color: var(--text);
    }

    body {
      min-width: 960px;
      min-height: 540px;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 68% 18%, rgba(133, 173, 177, 0.42), transparent 22%),
        radial-gradient(circle at 28% 34%, rgba(56, 78, 66, 0.38), transparent 30%),
        linear-gradient(115deg, #020304 0%, #071012 41%, #121412 100%);
    }

    .video {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.08) 36%, rgba(0, 0, 0, 0.68)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.08) 42%, rgba(0, 0, 0, 0.5)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=2400&q=88");
      background-size: cover;
      background-position: center;
      filter: saturate(0.86) brightness(0.58) contrast(1.08);
      transform: scale(1.012);
    }

    .video::before,
    .video::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .video::before {
      background:
        radial-gradient(ellipse at 49% 45%, transparent 0 22%, rgba(0, 0, 0, 0.24) 46%, rgba(0, 0, 0, 0.72) 88%),
        linear-gradient(180deg, rgba(5, 7, 10, 0.12), rgba(5, 7, 10, 0.72));
    }

    .video::after {
      background:
        linear-gradient(98deg, rgba(5, 7, 10, 0.76) 0 14%, transparent 36% 62%, rgba(5, 7, 10, 0.68) 100%),
        radial-gradient(circle at 52% 29%, rgba(188, 221, 221, 0.18), transparent 22%);
      mix-blend-mode: normal;
    }

    .top-osd {
      position: absolute;
      left: var(--safe-x);
      top: var(--safe-top);
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      gap: 20px;
      min-width: 520px;
      max-width: 760px;
      min-height: 64px;
      padding: 12px 16px 12px 18px;
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(5, 7, 10, 0.82), rgba(16, 22, 28, 0.58));
      backdrop-filter: blur(18px) saturate(115%);
      border: 1px solid rgba(238, 243, 246, 0.08);
    }

    .title {
      margin: 0 0 4px;
      font-family: "Segoe UI Variable Display", "Segoe UI", system-ui, sans-serif;
      font-size: 24px;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
      line-height: 20px;
      white-space: nowrap;
    }

    .direct {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(32, 40, 50, 0.76);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .direct-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--play-accent);
    }

    .subtitle {
      position: absolute;
      left: 50%;
      bottom: calc(var(--safe-bottom) + 150px);
      max-width: 74vw;
      transform: translateX(-50%);
      color: var(--text);
      font-size: 28px;
      font-weight: 500;
      line-height: 36px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.95), 0 0 2px rgba(0, 0, 0, 0.9);
      white-space: nowrap;
    }

    .bottom-osd {
      position: absolute;
      left: var(--safe-x);
      right: var(--safe-x);
      bottom: var(--safe-bottom);
      height: 128px;
      display: grid;
      grid-template-rows: 28px 56px;
      row-gap: 10px;
      padding: 14px 26px 20px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(16, 22, 28, 0.74), rgba(5, 7, 10, 0.82));
      backdrop-filter: blur(20px) saturate(118%);
      border: 1px solid rgba(238, 243, 246, 0.09);
    }

    .timeline {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) 74px;
      align-items: center;
      column-gap: 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 20px;
      font-variant-numeric: tabular-nums;
    }

    .track {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: rgba(238, 243, 246, 0.28);
      overflow: hidden;
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 17.6%;
      border-radius: inherit;
      background: var(--progress);
    }

    .track::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 17.6%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #91c79b;
      transform: translate(-50%, -50%);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(330px, 1fr) minmax(320px, 0.95fr);
      align-items: center;
      column-gap: 18px;
      min-height: 56px;
    }

    .left-actions,
    .right-actions,
    .transport {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .right-actions {
      justify-content: flex-end;
    }

    .transport {
      justify-content: center;
      gap: 18px;
    }

    .chip,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      color: var(--text);
      font-family: inherit;
      letter-spacing: 0;
      user-select: none;
    }

    .chip {
      height: 46px;
      min-width: 92px;
      gap: 9px;
      padding: 0 14px;
      border-radius: 6px;
      background: rgba(32, 40, 50, 0.72);
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .chip.primary {
      color: var(--text);
      background: rgba(238, 243, 246, 0.14);
    }

    .icon {
      width: 22px;
      height: 22px;
      display: block;
      flex: 0 0 auto;
      color: currentColor;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
    }

    .icon-btn.focused {
      width: 56px;
      height: 56px;
      background: var(--focus-fill);
      transform: scale(1.035);
    }

    .icon-btn.focused .icon {
      color: var(--play-accent);
      width: 28px;
      height: 28px;
    }

    .track-menu {
      position: absolute;
      right: var(--safe-x);
      bottom: calc(var(--safe-bottom) + 142px);
      width: 420px;
      padding: 12px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(16, 22, 28, 0.84), rgba(5, 7, 10, 0.9));
      backdrop-filter: blur(22px) saturate(112%);
      border: 1px solid rgba(238, 243, 246, 0.1);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    body[data-state="tracks"] .track-menu {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .menu-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 4px 10px;
      color: var(--text);
    }

    .menu-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
    }

    .menu-kicker {
      color: var(--subtle);
      font-size: 13px;
      font-weight: 600;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .option {
      min-height: 56px;
      padding: 9px 12px;
      border-radius: 6px;
      background: rgba(32, 40, 50, 0.58);
      color: var(--muted);
    }

    .option strong,
    .option span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .option strong {
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      line-height: 20px;
    }

    .option span {
      margin-top: 2px;
      color: var(--subtle);
      font-size: 13px;
      line-height: 18px;
    }

    .option.selected {
      background: rgba(104, 114, 122, 0.56);
      color: var(--text);
    }

    .option.selected strong::after {
      content: "  ✓";
      color: var(--play-accent);
    }

    .preview-switcher {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .preview-switcher:hover,
    .preview-switcher:focus-within {
      opacity: 1;
    }

    .preview-switcher button {
      height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(238, 243, 246, 0.18);
      border-radius: 6px;
      background: rgba(5, 7, 10, 0.72);
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
    }

    body[data-state="default"] [data-set-state="default"],
    body[data-state="tracks"] [data-set-state="tracks"] {
      color: var(--text);
      background: rgba(104, 114, 122, 0.56);
    }

    @media (max-width: 1100px), (max-height: 620px) {
      :root {
        --safe-x: 40px;
        --safe-top: 28px;
        --safe-bottom: 44px;
      }

      .top-osd {
        min-width: 460px;
        min-height: 58px;
      }

      .title {
        font-size: 21px;
        line-height: 26px;
      }

      .subtitle {
        bottom: calc(var(--safe-bottom) + 138px);
        font-size: 23px;
        line-height: 31px;
      }

      .bottom-osd {
        height: 118px;
        grid-template-rows: 26px 52px;
        row-gap: 8px;
        padding: 12px 20px 18px;
      }

      .controls {
        grid-template-columns: 0.85fr 1fr 0.95fr;
      }

      .chip {
        height: 42px;
        min-width: 80px;
        font-size: 14px;
      }

      .icon-btn {
        width: 40px;
        height: 40px;
      }

      .icon-btn.focused {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body data-state="default">
  <main class="stage" aria-label="Playback OSD compact preview">
    <div class="video" aria-hidden="true"></div>

    <section class="top-osd" aria-label="Current title">
      <div>
        <h1 class="title">颠峰猎杀</h1>
        <div class="meta">电影 · 2026 · 1小时36分 · R</div>
      </div>
      <div class="direct"><span class="direct-dot"></span>Direct Play</div>
    </section>

    <div class="subtitle">没错，这条路是唯一的出路。</div>

    <section class="track-menu" aria-label="Audio and subtitle selector">
      <div class="menu-head">
        <div class="menu-title">字幕 / 音轨</div>
        <div class="menu-kicker">播放设置</div>
      </div>
      <div class="menu-grid">
        <div class="option selected">
          <strong>English EAC3 5.1</strong>
          <span>默认音轨</span>
        </div>
        <div class="option">
          <strong>中文 AAC 2.0</strong>
          <span>备选音轨</span>
        </div>
        <div class="option selected">
          <strong>eng SDH</strong>
          <span>SubRip 字幕</span>
        </div>
        <div class="option">
          <strong>关闭字幕</strong>
          <span>仅保留画面和音频</span>
        </div>
      </div>
    </section>

    <section class="bottom-osd" aria-label="Playback controls">
      <div class="timeline">
        <span>16:17</span>
        <div class="track" aria-hidden="true"></div>
        <span>1:36:00</span>
      </div>

      <div class="controls">
        <div class="left-actions">
          <button class="chip primary" type="button">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M5 5h8.5A4.5 4.5 0 0 1 18 9.5v9" />
              <path d="M5 5v6h6" />
            </svg>
            版本
          </button>
          <button class="chip" type="button">4K HEVC</button>
          <button class="chip" type="button">HDR10</button>
        </div>

        <div class="transport" aria-label="Transport controls">
          <button class="icon-btn" type="button" aria-label="Back 10 seconds">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M7 6H3v4" />
              <path d="M3.3 10A8 8 0 1 0 6 4.2" />
              <text x="8" y="16" fill="currentColor" stroke="none" font-size="7" font-family="Segoe UI">10</text>
            </svg>
          </button>
          <button class="icon-btn focused" type="button" aria-label="Pause">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="7" y="5" width="3.6" height="14" rx="1"></rect>
              <rect x="13.4" y="5" width="3.6" height="14" rx="1"></rect>
            </svg>
          </button>
          <button class="icon-btn" type="button" aria-label="Forward 10 seconds">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M17 6h4v4" />
              <path d="M20.7 10A8 8 0 1 1 18 4.2" />
              <text x="8" y="16" fill="currentColor" stroke="none" font-size="7" font-family="Segoe UI">10</text>
            </svg>
          </button>
        </div>

        <div class="right-actions">
          <button class="chip primary" type="button" data-set-state="tracks">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 6h16v9H7l-3 3V6Z" />
              <path d="M8 10h4" />
              <path d="M14 10h2" />
            </svg>
            字幕/音轨
          </button>
          <button class="chip" type="button">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <circle cx="5" cy="12" r="1.6"></circle>
              <circle cx="12" cy="12" r="1.6"></circle>
              <circle cx="19" cy="12" r="1.6"></circle>
            </svg>
            更多
          </button>
        </div>
      </div>
    </section>
  </main>

  <div class="preview-switcher" aria-label="Preview state switcher">
    <button type="button" data-set-state="default">默认</button>
    <button type="button" data-set-state="tracks">字幕/音轨</button>
  </div>

  <script>
    const body = document.body;
    const buttons = document.querySelectorAll("[data-set-state]");
    function setState(state) {
      body.dataset.state = state;
      const url = new URL(window.location.href);
      url.searchParams.set("state", state);
      history.replaceState(null, "", url);
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => setState(button.dataset.setState));
    });

    const initialState = new URLSearchParams(window.location.search).get("state");
    if (initialState === "tracks") {
      body.dataset.state = "tracks";
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === "1") setState("default");
      if (event.key === "2") setState("tracks");
      if (event.key === "Escape") setState("default");
    });
  </script>
</body>
</html>
